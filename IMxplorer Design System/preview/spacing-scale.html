<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;background:var(--imx-dark);padding:24px;overflow:hidden;color:var(--imx-light);font-family:var(--font-body)}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.block{border:1px dashed rgba(255,255,255,0.16);padding:14px;border-radius:8px}
.n{font-family:var(--font-brand);font-size:0.54rem;letter-spacing:0.22em;color:rgba(255,255,255,0.55);text-transform:uppercase;margin-bottom:6px;font-weight:700}
.v{font-family:var(--font-brand);font-size:0.62rem;color:rgba(255,255,255,0.4);font-variant-numeric:tabular-nums}
.box{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);margin-top:6px}
.s1{width:4px;height:4px}
.s2{width:8px;height:8px}
.s4{width:16px;height:16px}
.s6{width:24px;height:24px}
.s8{width:32px;height:32px}
.s12{width:48px;height:48px}
.s16{width:64px;height:64px}
.s20{width:80px;height:80px}
</style></head><body>
<div class="grid">
  <div class="block"><div class="n">space-1</div><div class="v">0.25rem · 4px</div><div class="box s1"></div></div>
  <div class="block"><div class="n">space-2</div><div class="v">0.5rem · 8px</div><div class="box s2"></div></div>
  <div class="block"><div class="n">space-4</div><div class="v">1rem · 16px</div><div class="box s4"></div></div>
  <div class="block"><div class="n">space-6</div><div class="v">1.5rem · 24px</div><div class="box s6"></div></div>
  <div class="block"><div class="n">space-8</div><div class="v">2rem · 32px</div><div class="box s8"></div></div>
  <div class="block"><div class="n">space-12</div><div class="v">3rem · 48px</div><div class="box s12"></div></div>
</div>
</body></html>
