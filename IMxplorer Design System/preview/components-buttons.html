<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;background:var(--imx-dark);padding:26px;overflow:hidden;color:var(--imx-light);font-family:var(--font-body)}
.row{display:flex;gap:14px;flex-wrap:wrap;align-items:center;margin-bottom:14px}
.btn{display:inline-flex;align-items:center;gap:14px;border:1px solid rgba(255,255,255,0.3);padding:14px 28px;font-family:var(--font-brand);font-size:0.72rem;font-weight:700;letter-spacing:0.22em;text-transform:uppercase;color:#fff;text-decoration:none;background:transparent;border-radius:0;cursor:pointer;transition:all .45s cubic-bezier(.16,1,.3,1)}
.btn:hover{background:#fff;color:#000}
.btn .ln{display:block;height:1px;width:20px;background:rgba(255,255,255,0.6);transition:background .3s}
.btn:hover .ln{background:#000}
.pill{display:inline-flex;align-items:center;gap:10px;border:1px solid rgba(184,148,63,0.55);background:rgba(184,148,63,0.09);padding:13px 26px;border-radius:999px;font-family:var(--font-brand);font-size:0.66rem;font-weight:700;letter-spacing:0.25em;text-transform:uppercase;color:#c9a84c;cursor:pointer;transition:all .3s}
.pill:hover{background:rgba(184,148,63,0.22);color:#e8c96a}
.arrow{width:12px;height:12px}
.ghost{display:inline-flex;align-items:center;gap:10px;font-family:var(--font-brand);font-size:0.6rem;font-weight:700;letter-spacing:0.28em;text-transform:uppercase;color:rgba(201,168,76,0.85);cursor:pointer;background:none;border:0}
.ghost span{display:block;height:1px;width:36px;background:currentColor}
.tag{font-family:var(--font-brand);font-size:0.52rem;letter-spacing:0.3em;color:rgba(255,255,255,0.35);text-transform:uppercase}
</style></head><body>
<div class="row">
  <a class="btn">Plan Your Journey <span class="ln"></span></a>
  <a class="pill">Enquire <svg class="arrow" viewBox="0 0 12 12" fill="none"><path d="M2 6h8M7 3l3 3-3 3" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/></svg></a>
  <a class="ghost">Enquire Privately <span></span></a>
</div>
<div class="tag">Primary · Pill CTA · Ghost link with hairline</div>
</body></html>
