<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;background:#0a0a0a;padding:0;overflow:hidden;color:var(--imx-light);font-family:var(--font-body)}
.wrap{position:relative;height:320px;overflow:hidden;display:flex;align-items:flex-end;padding:24px}
.bg{position:absolute;inset:0;background:
  radial-gradient(ellipse 50% 45% at 80% 15%,rgba(184,148,63,0.22),transparent 60%),
  radial-gradient(ellipse 40% 35% at 12% 85%,rgba(143,47,47,0.18),transparent 55%),
  linear-gradient(160deg,rgba(10,10,10,0.55) 0%,rgba(10,10,10,0.2) 50%,rgba(10,10,10,0.75) 100%),
  linear-gradient(135deg,#2a1e14 0%,#1a1410 50%,#0f0e0c 100%)}
.content{position:relative;z-index:2;max-width:760px}
.eb{font-family:var(--font-brand);font-size:0.54rem;letter-spacing:0.44em;color:rgba(184,148,63,0.85);text-transform:uppercase;font-weight:700;margin-bottom:12px}
h1{font-family:var(--font-serif);font-weight:300;font-size:4.6rem;line-height:0.94;letter-spacing:-0.018em;margin:0;color:#fff}
h1 em{font-style:italic;color:rgba(246,242,233,0.42)}
p{font-family:var(--font-sans);font-size:0.82rem;line-height:1.7;color:rgba(255,255,255,0.55);max-width:44ch;margin:14px 0 0;font-weight:300}
.bottom{position:absolute;left:0;right:0;bottom:0;height:50px;background:linear-gradient(to bottom,transparent,#0a0a0a)}
</style></head><body>
<div class="wrap">
  <div class="bg"></div>
  <div class="content">
    <div class="eb">What We Do</div>
    <h1>Every kind of journey.<br><em>One team behind it.</em></h1>
    <p>We don't sell packages. We design and execute each travel program around your objectives, timeline, and comfort standard.</p>
  </div>
  <div class="bottom"></div>
</div>
</body></html>
