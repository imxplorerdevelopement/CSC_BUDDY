<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;background:var(--imx-dark);color:var(--imx-light);font-family:var(--font-body);padding:28px;overflow:hidden}
.wm{font-family:var(--font-brand);font-weight:700;letter-spacing:0.22em;font-size:2.1rem;color:var(--imx-light)}
.tag{font-family:var(--font-brand);font-weight:600;letter-spacing:0.32em;font-size:0.58rem;color:var(--imx-gold);margin-top:8px;text-transform:uppercase}
.sub{font-family:var(--font-serif);font-style:italic;font-weight:300;font-size:1.05rem;color:rgba(252,249,248,0.6);margin-top:6px}
.row{display:flex;align-items:center;gap:36px}
.bar{width:1px;height:70px;background:rgba(255,255,255,0.12)}
.dot{display:inline-block;width:6px;height:6px;border-radius:999px;background:rgba(184,148,63,0.98);box-shadow:0 0 8px rgba(184,148,63,0.58);margin-right:6px;vertical-align:middle}
.iata{font-family:var(--font-brand);color:rgba(184,148,63,0.94);font-size:0.62rem;letter-spacing:0.18em;margin-top:10px;text-transform:uppercase}
</style></head><body>
<div class="row">
  <div>
    <div class="wm">IMXPLORER</div>
    <div class="tag">The Travel Co.</div>
  </div>
  <div class="bar"></div>
  <div>
    <div class="sub">"The care is the luxury."</div>
    <div class="iata"><span class="dot"></span>IATA ACCREDITED</div>
  </div>
</div>
</body></html>
