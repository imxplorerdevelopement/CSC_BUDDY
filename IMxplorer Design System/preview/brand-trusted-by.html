<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;background:#0a0a0a;padding:24px;overflow:hidden;color:var(--imx-light);font-family:var(--font-body)}
.track{display:flex;gap:1px;overflow:hidden}
.tile{flex:0 0 200px;min-height:130px;display:flex;align-items:center;justify-content:center;padding:20px;background:#fff;color:rgba(10,10,10,0.85)}
.s-sans{font-family:var(--font-sans);font-size:1.25rem;font-weight:700;letter-spacing:-0.02em}
.s-serif{font-family:var(--font-serif);font-style:italic;font-size:1.5rem;font-weight:400}
.s-brand{font-family:var(--font-brand);font-weight:700;font-size:0.9rem;letter-spacing:0.2em;text-transform:uppercase}
h3{font-family:var(--font-brand);font-size:0.58rem;letter-spacing:0.3em;color:var(--imx-gold);margin:0 0 14px;text-transform:uppercase;font-weight:700}
</style></head><body>
<h3>Trusted By · Wordmark-as-type marquee</h3>
<div class="track">
  <div class="tile"><span class="s-brand">BMW Group</span></div>
  <div class="tile"><span class="s-sans">Samsung</span></div>
  <div class="tile"><span class="s-brand">Amway</span></div>
  <div class="tile"><span class="s-serif">Ryan International</span></div>
  <div class="tile"><span class="s-brand">SBI Card</span></div>
  <div class="tile"><span class="s-serif">Golden Grande</span></div>
</div>
</body></html>
