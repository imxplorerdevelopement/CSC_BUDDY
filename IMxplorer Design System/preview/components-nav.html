<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;background:var(--imx-dark);padding:24px;overflow:hidden;color:var(--imx-light);font-family:var(--font-body)}
.nav{max-width:860px;margin:0 auto;padding:8px 8px 8px 24px;border:1px solid rgba(255,255,255,0.1);border-radius:999px;background:rgba(10,10,10,0.28);backdrop-filter:blur(24px);box-shadow:0 8px 40px rgba(0,0,0,0.55),0 0 0 1px rgba(255,255,255,0.03);display:flex;align-items:center;justify-content:space-between;gap:16px}
.logo{font-family:var(--font-brand);font-weight:700;letter-spacing:0.22em;font-size:0.92rem;color:#fff}
.links{display:flex;gap:28px;font-family:var(--font-brand);font-size:0.58rem;font-weight:500;letter-spacing:0.18em;color:rgba(252,249,248,0.75);text-transform:uppercase}
.links a{color:inherit;text-decoration:none;transition:color .3s}
.links a:hover{color:var(--imx-red)}
.cta{padding:9px 22px;border:1px solid rgba(184,148,63,0.5);background:rgba(184,148,63,0.12);border-radius:999px;font-family:var(--font-brand);font-size:0.6rem;font-weight:700;letter-spacing:0.25em;color:#c9a84c;text-transform:uppercase;cursor:pointer}
.tag{font-family:var(--font-brand);font-size:0.5rem;letter-spacing:0.3em;color:rgba(255,255,255,0.3);text-transform:uppercase;margin-top:14px;text-align:center}
</style></head><body>
<div class="nav">
  <div class="logo">IMXPLORER</div>
  <div class="links">
    <a>Philosophy</a><a>Journey</a><a>About</a><a>Services</a><a>Blogs</a><a>LUXE</a>
  </div>
  <div class="cta">Enquire</div>
</div>
<div class="tag">Scrolled nav — pill, glass, backdrop-blur 24px</div>
</body></html>
