<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;background:var(--imx-bg-deep);padding:24px;overflow:hidden;color:var(--imx-light);font-family:var(--font-body)}
.row{display:grid;grid-template-columns:repeat(5,1fr);gap:10px}
.sw{border-radius:10px;padding:14px;min-height:96px;display:flex;flex-direction:column;justify-content:space-between;color:#fff;position:relative;overflow:hidden}
.sw::before{content:'';position:absolute;inset:0;background:linear-gradient(105deg,rgba(8,8,9,0.4),transparent 60%)}
.nm{font-family:var(--font-brand);font-size:0.54rem;letter-spacing:0.22em;text-transform:uppercase;font-weight:700;position:relative;z-index:1}
.hex{font-family:var(--font-brand);font-size:0.6rem;opacity:0.9;font-variant-numeric:tabular-nums;position:relative;z-index:1}
.sub{font-family:var(--font-serif);font-style:italic;font-weight:300;font-size:0.82rem;opacity:0.95;position:relative;z-index:1;margin-top:4px}
</style></head><body>
<div class="row">
  <div class="sw" style="background:#c8922a"><div><div class="nm">01 Holidays</div><div class="sub">Warn gold</div></div><div class="hex">#C8922A</div></div>
  <div class="sw" style="background:#4a82c0"><div><div class="nm">02 Study</div><div class="sub">Oxford blue</div></div><div class="hex">#4A82C0</div></div>
  <div class="sw" style="background:#c0414a"><div><div class="nm">03 MICE</div><div class="sub">Signal red</div></div><div class="hex">#C0414A</div></div>
  <div class="sw" style="background:#3a9e78"><div><div class="nm">04 Logistics</div><div class="sub">Emerald</div></div><div class="hex">#3A9E78</div></div>
  <div class="sw" style="background:#8b6fc0"><div><div class="nm">05 Visas</div><div class="sub">Aster</div></div><div class="hex">#8B6FC0</div></div>
</div>
</body></html>
