<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;background:var(--imx-dark);padding:24px;overflow:hidden;color:var(--imx-light);font-family:var(--font-body)}
.row{display:grid;grid-template-columns:repeat(5,1fr);gap:10px}
.sw{border-radius:8px;padding:12px;min-height:74px;display:flex;flex-direction:column;justify-content:space-between;border:1px solid rgba(255,255,255,0.06)}
.nm{font-family:var(--font-brand);font-size:0.54rem;letter-spacing:0.2em;text-transform:uppercase;font-weight:700}
.hex{font-family:var(--font-brand);font-size:0.6rem;opacity:0.7;font-variant-numeric:tabular-nums}
h3{font-family:var(--font-brand);font-size:0.58rem;letter-spacing:0.3em;color:var(--imx-gold);margin:0 0 10px;text-transform:uppercase;font-weight:700}
.gap{height:14px}
</style></head><body>
<h3>Extended · Blacks + Creams</h3>
<div class="row">
  <div class="sw" style="background:#0a0a0a;color:#f6f2e9"><div class="nm">bg</div><div class="hex">#0A0A0A</div></div>
  <div class="sw" style="background:#080809;color:#f6f2e9"><div class="nm">bg-deep</div><div class="hex">#080809</div></div>
  <div class="sw" style="background:#0d0b08;color:#f6f2e9"><div class="nm">bg-soft</div><div class="hex">#0D0B08</div></div>
  <div class="sw" style="background:#fcf9f8;color:#0a0a0a"><div class="nm">cream</div><div class="hex">#FCF9F8</div></div>
  <div class="sw" style="background:#f0ece9;color:#0a0a0a"><div class="nm">cream-soft</div><div class="hex">#F0ECE9</div></div>
</div>
<div class="gap"></div>
<h3>Live Accents</h3>
<div class="row">
  <div class="sw" style="background:#d6052b;color:#fff"><div class="nm">red-bright</div><div class="hex">#D6052B</div></div>
  <div class="sw" style="background:#c9a84c;color:#0f1116"><div class="nm">gold-deep</div><div class="hex">#C9A84C</div></div>
  <div class="sw" style="background:#25d366;color:#0a0a0a"><div class="nm">WhatsApp</div><div class="hex">#25D366</div></div>
  <div class="sw" style="background:rgba(255,255,255,0.06);color:#f6f2e9"><div class="nm">glass</div><div class="hex">white 6%</div></div>
  <div class="sw" style="background:rgba(10,10,10,0.65);color:#f6f2e9;border:1px solid rgba(255,255,255,0.1)"><div class="nm">glass-deep</div><div class="hex">ink 65%</div></div>
</div>
</body></html>
