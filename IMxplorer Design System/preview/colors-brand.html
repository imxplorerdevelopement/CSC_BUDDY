<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;background:var(--imx-dark);padding:24px;overflow:hidden;color:var(--imx-light);font-family:var(--font-body)}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.sw{border-radius:8px;padding:14px;min-height:86px;display:flex;flex-direction:column;justify-content:space-between;border:1px solid rgba(255,255,255,0.06)}
.nm{font-family:var(--font-brand);font-size:0.56rem;letter-spacing:0.22em;text-transform:uppercase;font-weight:700}
.hex{font-family:var(--font-brand);font-size:0.62rem;letter-spacing:0.08em;opacity:0.7;font-variant-numeric:tabular-nums}
</style></head><body>
<div class="grid">
  <div class="sw" style="background:#8f2f2f;color:#f6f2e9"><div class="nm">imxRed</div><div class="hex">#8F2F2F</div></div>
  <div class="sw" style="background:#d3a65a;color:#0f1116"><div class="nm">imxGold</div><div class="hex">#D3A65A</div></div>
  <div class="sw" style="background:#0f1116;color:#f6f2e9"><div class="nm">imxDark</div><div class="hex">#0F1116</div></div>
  <div class="sw" style="background:#f6f2e9;color:#0a0a0a"><div class="nm">imxLight</div><div class="hex">#F6F2E9</div></div>
</div>
</body></html>
