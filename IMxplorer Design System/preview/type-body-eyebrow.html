<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;background:var(--imx-dark);padding:24px 32px;overflow:hidden;color:var(--imx-light)}
.eb{font-family:var(--font-brand);font-weight:700;font-size:0.62rem;letter-spacing:0.3em;text-transform:uppercase;margin-bottom:6px}
.eb.red{color:var(--imx-red)}
.eb.gold{color:var(--imx-gold)}
.eb.mute{color:rgba(255,255,255,0.22)}
p{font-family:var(--font-sans);font-weight:400;font-size:0.9rem;line-height:1.72;color:rgba(252,249,248,0.6);margin:0;max-width:58ch}

.meta{font-family:var(--font-brand);font-size:0.5rem;letter-spacing:0.24em;color:rgba(255,255,255,0.25);text-transform:uppercase;margin-top:4px;font-variant-numeric:tabular-nums}

<div class="block">
  <div class="eb red">Our Differentiator</div>
  <div class="eb gold">Concierge &amp; HNI</div>

  <div class="meta">Eyebrow · League Spartan 700 · 0.3em</div>
</div>
<div class="block">
  <p>No algorithms. No ready-made packages. 100% customised travel from first call to safe return.</p>
  <div class="meta">Body · Manrope 400 · 0.9rem / 1.72</div>
</div>
<div class="block">
  <p class="lg">One-on-one consultation, flawless execution.</p>
  <div class="meta">Body-lg · 1.06rem / 1.78</div>
</div>
